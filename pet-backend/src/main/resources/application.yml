spring:
  application:
    name: petmediscan-backend
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"  #"{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

  

  datasource:
    # Docker 컨테이너에서 실행 시: host.docker.internal 사용
    #url: jdbc:mysql://host.docker.internal:3308/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    # 로컬 개발 (gradlew bootRun): 192.168.2.15:3308 사용
    # url: jdbc:mysql://petmediscan-mysql:3306/KIT125?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useHostsInPrivileges=false
    # username: admin
    # password: 1234
    # driver-class-name: com.mysql.cj.jdbc.Driver

    # H2-DataBase
    url: jdbc:h2:~/local
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        #dialect: org.hibernate.dialect.MySQL8Dialect
        dialect: org.hibernate.dialect.H2Dialect
server:
  port: 8080

jwt:
  #secret: ${JWT_SECRET}
  # 최소 32자 이상 필요
  secret: test-secret-key-1234567890-abcdef
  expiration_time: 3600

logging:
  level:
    com.example.demo: DEBUG
