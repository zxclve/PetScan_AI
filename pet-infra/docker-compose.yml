version: '3.8'

services:
  # Database - MySQL 8.0
  db:
    image: mysql:8.0
    container_name: petmediscan-db
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=KIT125
      - MYSQL_USER=pet_user
      - MYSQL_PASSWORD=pet_pass123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petmediscan-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  # Backend - Spring Boot
  backend:
    build: ../pet-backend
    container_name: petmediscan-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/KIT125?useUnicode=true&characterEncoding=utf8mb4
      - SPRING_DATASOURCE_USERNAME=pet_user
      - SPRING_DATASOURCE_PASSWORD=pet_pass123
      - AI_EYE_SERVICE_URL=http://ai-eye:5000
      - AI_SKIN_SERVICE_URL=http://ai-skin:5001
      - JWT_SECRET=your-secret-key-256-bits-minimum-length-required-here
    depends_on:
      - db
      - ai-eye
      - ai-skin
    networks:
      - petmediscan-network
    restart: unless-stopped

  # AI Model - Eye Disease Detection
  ai-eye:
    build: ../pet-ai-eye
    container_name: petmediscan-ai-eye
    ports:
      - "5000:5000"
    volumes:
      - ./models/eye:/app/models
    networks:
      - petmediscan-network
    restart: unless-stopped

  # AI Model - Skin Disease Detection
  ai-skin:
    build: ../pet-ai-skin
    container_name: petmediscan-ai-skin
    ports:
      - "5001:5001"
    volumes:
      - ./models/skin:/app/models
    networks:
      - petmediscan-network
    restart: unless-stopped

  # Jenkins CI/CD Server
  jenkins:
    image: jenkins/jenkins:lts
    container_name: petmediscan-jenkins
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
    networks:
      - petmediscan-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  jenkins_data:
    driver: local

networks:
  petmediscan-network:
    driver: bridge
